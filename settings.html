<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Koinonia Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 16px;
      color: #172b4d;
      background: #fff;
    }
    h3 { font-size: 13px; font-weight: 600; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .section { margin-bottom: 20px; }
    label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
    label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .list-name { color: #172b4d; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #0079bf; }
    .hint { font-size: 12px; color: #5e6c84; margin-bottom: 8px; }
    .hint a { color: #0079bf; }
    button {
      background: #0079bf;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #026aa7; }
    #status { margin-top: 10px; font-size: 13px; color: #61bd4f; text-align: center; display: none; }
    #error { margin-top: 10px; font-size: 13px; color: #eb5a46; text-align: center; display: none; }
    .loading { color: #5e6c84; font-size: 13px; }
  </style>
</head>
<body>
  <div class="section">
    <h3>Auto-Sort Lists</h3>
    <div id="lists-container"><p class="loading">Loading lists...</p></div>
  </div>

  <div class="section">
    <h3>API Credentials</h3>
    <p class="hint">Get your key & token at <a href="https://trello.com/app-key" target="_blank">trello.com/app-key</a></p>
    <input type="password" id="apiKey" placeholder="API Key" autocomplete="off" />
    <input type="password" id="token" placeholder="Token" autocomplete="off" />
  </div>

  <button id="save-btn">Save Settings</button>
  <div id="status">Settings saved!</div>
  <div id="error"></div>

  <script src="/js/settings.js"></script>
</body>
</html>
